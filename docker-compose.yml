version: '3.8'

services:
  # 1. PostgreSQL 데이터베이스 컨테이너
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=lottodb
      - POSTGRES_USER=lottouser
      - POSTGRES_PASSWORD=lottopass
    ports:
      - "5432:5432"

  # 2. Django 웹 어플리케이션 컨테이너
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db  

volumes:
  postgres_data: 